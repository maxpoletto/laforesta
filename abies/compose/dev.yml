# compose/dev.yml -- abies dev stack on remote vm
#
# Driven from local tree via docker context (see bin/deploy). Build context is
# the local abies repo dir; volume paths and container live on the remote VM
# (the docker daemon's host).

services:
  abies:
    image: abies:dev
    container_name: abies-dev
    build:
      context: ..
    restart: unless-stopped

    # Bind only to loopback. Apache is the public entry point.
    ports:
      - "127.0.0.1:8001:8000"

    volumes:
      - /var/lib/abies-dev/data:/app/data
      - /var/lib/abies-dev/staticfiles:/app/staticfiles
      - /var/backups/abies-dev:/app/backup

    env_file:
      - .env.dev
    environment:
      ABIES_INSTANCE: dev
      ABIES_VERSION: ${ABIES_VERSION:-}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
