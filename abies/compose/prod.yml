# compose/prod.yml -- abies prod stack on remote vm
#
# Driven from local tree via docker context (see bin/deploy). Build context is
# the local abies repo dir; volume paths and container live on the remote VM
# (the docker daemon's host).

services:
  abies:
    image: abies:prod
    container_name: abies-prod
    build:
      context: ..
    restart: unless-stopped

    # Bind only to loopback. Apache is the public entry point.
    ports:
      - "127.0.0.1:8000:8000"

    volumes:
      - /var/lib/abies-prod/data:/app/data
      - /var/lib/abies-prod/staticfiles:/app/staticfiles
      - /var/backups/abies-prod:/app/backup

    env_file:
      - .env.prod

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
