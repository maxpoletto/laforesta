<div class="form-card">
  <form id="bosco-pai-form">
    <input type="hidden" name="row_id" value="{{ tree.id|default_if_none:'' }}">
    <input type="hidden" name="version" value="{{ version }}">

    <h2>{% if tree %}Modifica PAI{% else %}Nuovo PAI{% endif %}</h2>

    <div class="form-row">
      <div class="form-group">
        <label for="id_pai_species">Specie</label>
        <select id="id_pai_species" name="species_id" required>
          <option value="">---</option>
          {% for sp in species %}
          <option value="{{ sp.id }}"
            {% if selected_species_id == sp.id %}selected{% endif %}>{{ sp.common_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="id_pai_year">Anno</label>
        <input type="number" id="id_pai_year" name="year" required
               min="1900" max="2200" value="{{ year }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="id_pai_parcel">Particella</label>
        <select id="id_pai_parcel" name="parcel_id" required>
          <option value="">---</option>
          {% for parcel in parcels %}
          <option value="{{ parcel.id }}" data-region="{{ parcel.region_id }}"
                  data-key="{{ parcel.region.name }}|{{ parcel.name }}"
            {% if selected_parcel_id == parcel.id %}selected{% endif %}>
            {{ parcel.region.name }} {{ parcel.name }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row bosco-pai-latlon-row">
      <div class="form-group">
        <label for="id_pai_lat">Lat</label>
        <input type="text" inputmode="decimal" id="id_pai_lat" name="lat"
               required value="{{ lat }}">
      </div>
      <div class="form-group">
        <label for="id_pai_lon">Lon</label>
        <input type="text" inputmode="decimal" id="id_pai_lon" name="lon"
               required value="{{ lon }}">
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn" data-action="cancel">Annulla</button>
      <button type="submit" class="btn btn-save">Salva</button>
      {% if not tree %}
      <button type="submit" class="btn" data-action="save-and-add">Salva e aggiungi</button>
      {% endif %}
    </div>
  </form>
</div>
