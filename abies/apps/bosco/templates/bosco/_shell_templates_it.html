{% comment %}
Bosco <template> elements — cloned by JS on mount().
Static Italian text lives here; JS wires controls and fills dynamic data.
{% endcomment %}

<template id="tmpl-bosco-page">
  <div class="bosco-page">
    <div class="bosco-map-host" id="bosco-map-host" data-target="map"></div>

    <aside class="bosco-sidebar" id="bosco-sidebar" aria-label="Controlli Bosco">
      <div class="bosco-sidebar-inner">
        <section class="bosco-sidebar-section bosco-status-section">
          <div class="bosco-status" data-role="status">Caricamento...</div>
          <div class="bosco-coords" id="coords"></div>
          <label for="bosco-region-select">Compresa</label>
          <select id="bosco-region-select" class="page-pulldown" data-role="region-select"></select>
          <p class="bosco-hint">
            Clicca su una particella per vederne i dettagli, o fuori dalle
            particelle per il riepilogo della compresa.
          </p>
        </section>

        <section class="bosco-sidebar-section">
          <h2>Modo</h2>
          <fieldset class="bosco-mode-group" data-role="mode-group">
            <label><input type="radio" name="bosco-mode" value="1"> Caratteristiche</label>
            <label><input type="radio" name="bosco-mode" value="2"> Evoluzione</label>
            <label><input type="radio" name="bosco-mode" value="3"> Piante ad accrescimento indefinito</label>
          </fieldset>
        </section>

        <section class="bosco-sidebar-section" data-mode-panel="1">
          <h2>Caratteristiche</h2>
          <label for="bosco-characteristic-select">Visualizza</label>
          <select id="bosco-characteristic-select" class="page-pulldown" data-role="characteristic-select">
            <optgroup label="Caratteristiche">
              <option value="1">Età media (a)</option>
              <option value="2">Governo</option>
              <option value="3">Alt. media (m)</option>
            </optgroup>
            <optgroup label="Produzione">
              <option value="4">Prelievo storico</option>
              <option value="5">Prelievo previsto</option>
            </optgroup>
            <optgroup label="Dati satellitari">
              <option value="6">NDVI</option>
              <option value="7">NDMI</option>
              <option value="8">EVI</option>
            </optgroup>
          </select>
          <label class="bosco-check"><input type="checkbox" data-role="cadastral-toggle"> Aree catastali</label>
          <label class="bosco-check" data-role="per-ha-row">
            <input type="checkbox" data-role="per-ha-toggle"> Valori per ettaro
          </label>
          <div class="bosco-legend" data-target="legend"></div>
        </section>

        <section class="bosco-sidebar-section" data-mode-panel="2" hidden>
          <h2>Evoluzione</h2>
          <label for="bosco-evolution-select">Parametro</label>
          <select id="bosco-evolution-select" class="page-pulldown" data-role="evolution-select">
            <option value="1">NDVI</option>
            <option value="2">NDMI</option>
            <option value="3">EVI</option>
            <option value="4">Prelievo</option>
          </select>
          <div class="bosco-date-row">
            <label for="bosco-evolution-date1">Da</label>
            <select id="bosco-evolution-date1" data-role="date1"></select>
            <label for="bosco-evolution-date2">A</label>
            <select id="bosco-evolution-date2" data-role="date2"></select>
          </div>
          <label class="bosco-check" data-role="parcel-average-row"><input type="checkbox" data-role="parcel-average-toggle"> Media per particella</label>
          <label class="bosco-check" data-role="evolution-per-ha-row"><input type="checkbox" data-role="evolution-per-ha-toggle"> Valori per ettaro</label>
          <label class="bosco-check"><input type="checkbox" data-role="evolution-cadastral-toggle"> Aree catastali</label>
          <div class="bosco-legend" data-target="diff-legend"></div>
        </section>

        <section class="bosco-sidebar-section" data-mode-panel="3" hidden>
          <h2>Piante ad accrescimento indefinito</h2>
          <div class="bosco-list-heading">Particelle</div>
          <div class="bosco-scroll-list" data-target="pai-parcels"></div>
          <div class="bosco-list-actions">
            <button type="button" class="btn" data-action="show-all-parcels">Mostra tutte</button>
            <button type="button" class="btn" data-action="hide-all-parcels">Nascondi tutte</button>
          </div>
          <div class="bosco-list-heading">Specie</div>
          <div class="bosco-scroll-list" data-target="pai-species"></div>
          <div class="bosco-list-actions">
            <button type="button" class="btn" data-action="show-all-species">Mostra tutte</button>
            <button type="button" class="btn" data-action="hide-all-species">Nascondi tutte</button>
          </div>
          {% if user.can_modify %}
          <button type="button" class="btn btn-create bosco-add-pai" data-action="add-pai">+ Aggiungi</button>
          {% endif %}
        </section>
      </div>
    </aside>

    <div class="bosco-detail-overlay" data-target="detail-overlay" hidden>
      <div class="bosco-detail-header">
        <div>
          <div class="bosco-detail-kicker" data-target="detail-scope"></div>
          <h1 data-target="detail-title"></h1>
        </div>
        <button type="button" class="btn bosco-detail-close" data-action="close-detail" aria-label="Chiudi" title="Chiudi">×</button>
      </div>
      <div class="bosco-detail-body">
        <section class="bosco-detail-section" data-detail-section="m">
          {% include "base/_partials/_collapsible_header.html" with section="bosco-detail-m" title="Metadati" %}
          <div class="collapsible-body" data-section="bosco-detail-m">
            <div class="bosco-detail-toolbar" data-target="metadata-actions" hidden>
              <button type="button" class="btn" data-action="edit-parcel-metadata">Modifica</button>
            </div>
            <div class="bosco-metadata-grid" data-target="metadata"></div>
          </div>
        </section>

        <section class="bosco-detail-section" data-detail-section="d">
          {% include "base/_partials/_collapsible_header.html" with section="bosco-detail-d" title="Dendrometria" %}
          <div class="collapsible-body" data-section="bosco-detail-d">
            <div class="bosco-detail-toolbar">
              <label class="bosco-check"><input type="checkbox" data-role="dendrometry-per-ha" checked> Per ettaro</label>
            </div>
            <div class="bosco-species-row">
              <span class="bosco-species-label">Specie:</span>
              <div class="bosco-species-filter" data-target="dendrometry-species"></div>
            </div>
            <div class="bosco-species-actions">
              <button type="button" class="btn" data-action="show-all-dendrometry-species">Tutte</button>
              <button type="button" class="btn" data-action="hide-all-dendrometry-species">Nessuna</button>
            </div>
            <div class="bosco-dendrometry-charts" data-target="dendrometry">
              <p class="bosco-detail-note" data-target="dendrometry-status"></p>
              <div class="bosco-chart-grid" data-target="dendrometry-chart-grid">
                <div class="bosco-chart-panel">
                  <h3>Numero alberi</h3>
                  <div class="bosco-chart-canvas">
                    <canvas data-target="dendrometry-tree-count-chart"></canvas>
                  </div>
                </div>
                <div class="bosco-chart-panel">
                  <h3>Volume totale</h3>
                  <div class="bosco-chart-canvas">
                    <canvas data-target="dendrometry-volume-chart"></canvas>
                  </div>
                </div>
                <div class="bosco-chart-panel">
                  <h3>Area basimetrica</h3>
                  <div class="bosco-chart-canvas">
                    <canvas data-target="dendrometry-basal-area-chart"></canvas>
                  </div>
                </div>
                <div class="bosco-chart-panel">
                  <h3>Altezza media</h3>
                  <div class="bosco-chart-canvas">
                    <canvas data-target="dendrometry-height-chart"></canvas>
                  </div>
                </div>
                <div class="bosco-chart-panel">
                  <h3>Incremento %</h3>
                  <div class="bosco-chart-canvas">
                    <canvas data-target="dendrometry-increment-chart"></canvas>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="bosco-detail-section" data-detail-section="p">
          {% include "base/_partials/_collapsible_header.html" with section="bosco-detail-p" title="Produzione storica" %}
          <div class="collapsible-body" data-section="bosco-detail-p">
            <div class="bosco-detail-toolbar">
              <label class="bosco-check"><input type="checkbox" data-role="production-per-ha" checked> Per ettaro</label>
              <label class="bosco-check"><input type="checkbox" data-role="production-monthly"> Mesi</label>
              <a class="btn" data-target="production-link" href="/prelievi">Apri in Prelievi</a>
            </div>
            <div class="bosco-production-chart" data-target="production-chart-host">
              <canvas data-target="production-chart"></canvas>
            </div>
            <p class="bosco-detail-note" data-target="production-summary"></p>
          </div>
        </section>
      </div>
    </div>

  </div>
</template>
