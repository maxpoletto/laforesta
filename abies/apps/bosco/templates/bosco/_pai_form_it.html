<div class="form-card">
  <form id="bosco-pai-form">
    <input type="hidden" name="row_id" value="{{ pai.id|default_if_none:'' }}">
    <input type="hidden" name="version" value="{{ version }}">

    <h2>{% if pai %}Modifica PAI{% else %}Nuovo PAI{% endif %}</h2>

    <div class="form-row">
      <div class="form-group">
        <label for="id_pai_species">Specie</label>
        <select id="id_pai_species" name="species_id" required>
          <option value="">---</option>
          {% for sp in species %}
          <option value="{{ sp.id }}"
            {% if selected_species_id == sp.id %}selected{% endif %}>{{ sp.common_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="id_pai_number">Numero</label>
        <input type="number" id="id_pai_number" name="number"
               min="1" step="1" value="{{ number }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="id_pai_date">Data di rilevamento</label>
        <input type="date" id="id_pai_date" name="date" value="{{ date }}">
      </div>
      <div class="form-group">
        <label for="id_pai_birth_year">Anno di nascita stimato</label>
        <input type="number" id="id_pai_birth_year" name="estimated_birth_year"
               min="1000" max="2200" step="1" value="{{ estimated_birth_year }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="id_pai_parcel">Particella</label>
        <select id="id_pai_parcel" name="parcel_id" required>
          <option value="">---</option>
          {% for parcel in parcels %}
          <option value="{{ parcel.id }}" data-region="{{ parcel.region_id }}"
            {% if selected_parcel_id == parcel.id %}selected{% endif %}>
            {{ parcel.region.name }} {{ parcel.name }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="id_pai_d_cm">D (cm)</label>
        <input type="number" id="id_pai_d_cm" name="d_cm" min="1" step="1"
               value="{{ d_cm }}">
      </div>
      <div class="form-group">
        <label for="id_pai_h_m">h (m)</label>
        <input type="text" inputmode="decimal" id="id_pai_h_m" name="h_m"
               value="{{ h_m }}">
      </div>
    </div>

    <div class="form-row bosco-pai-latlon-row">
      <div class="form-group">
        <label for="id_pai_lat">Lat</label>
        <input type="text" inputmode="decimal" id="id_pai_lat" name="lat"
               required value="{{ lat }}">
      </div>
      <div class="form-group">
        <label for="id_pai_lon">Lon</label>
        <input type="text" inputmode="decimal" id="id_pai_lon" name="lon"
               required value="{{ lon }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group form-group-wide">
        <label for="id_pai_note">Note</label>
        <textarea id="id_pai_note" name="note" rows="3">{{ note }}</textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn" data-action="cancel">{{ S.CANCEL }}</button>
      <button type="submit" class="btn btn-save">{{ S.SAVE }}</button>
      {% if not pai %}
      <button type="submit" class="btn btn-save" data-action="save-and-add">Salva e continua</button>
      {% endif %}
    </div>
  </form>
</div>
