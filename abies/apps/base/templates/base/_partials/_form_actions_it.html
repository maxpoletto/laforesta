{% comment %}
Cancel + submit pair for any form.  Caller supplies `submit_label`.
Usage: {% include "base/_partials/_form_actions.html" with submit_label=S.SAVE %}
{% endcomment %}<div class="form-actions">
  <button type="button" class="btn" data-action="cancel">{{ S.CANCEL }}</button>
  <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
</div>
