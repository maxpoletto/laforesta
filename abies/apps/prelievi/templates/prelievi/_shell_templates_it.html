{% comment %}
Prelievi <template> elements — cloned by JS on mount().
user.role is available from the shell's render context.
{% endcomment %}

<template id="tmpl-prelievi-page">
  <div class="prelievi-filter-bar">
    <span class="prelievi-filter-label">Anni</span>
    <div class="prelievi-slider-controls">
      <span class="prelievi-slider-label"></span>
      <div class="range-slider">
        <input type="range" data-role="slider-min">
        <input type="range" data-role="slider-max">
      </div>
    </div>
    <label class="prelievi-filter-label" for="prelievi-search">Filtra</label>
    <input type="text" class="table-search" id="prelievi-search"
           placeholder="Cerca…">
    <button type="button" class="btn btn-primary"
            data-action="reset-filters">Azzera filtri</button>
    <button type="button" class="btn btn-primary prelievi-csv-btn"
            data-action="export-csv">Esporta CSV</button>
  </div>

  <div class="collapsible-header" data-section="a">
    <span>Produzione</span><span class="arrow"></span>
  </div>
  <div class="collapsible-body" data-section="a">
    <div class="chart-controls">
      <select data-role="breakdown-select">
        <option value="total">Totale</option>
        <option value="compresa">Compresa</option>
        <option value="particella">Particella</option>
        <option value="squadra">Squadra</option>
        <option value="specie">Specie</option>
        <option value="trattore">Trattore</option>
        <option value="tipo">Tipo</option>
      </select>
      <label class="chart-month-toggle">
        <input type="checkbox" data-role="month-toggle"> Mesi
      </label>
    </div>
    <div class="chart-container"><canvas data-target="chart-a"></canvas></div>
  </div>

  <div class="collapsible-header" data-section="b">
    <span>Specie per particella</span><span class="arrow"></span>
  </div>
  <div class="collapsible-body" data-section="b">
    <div class="chart-container"><canvas data-target="chart-b"></canvas></div>
  </div>

  <div class="collapsible-header" data-section="i">
    <span>Interventi</span><span class="arrow"></span>
  </div>
  <div class="collapsible-body" data-section="i" data-target="table-host">
  </div>
</template>
