<form id="settings-form">
  <input type="hidden" name="row_id" value="{{ obj.id|default_if_none:'' }}">
  <input type="hidden" name="version" value="{{ obj.version|default:'1' }}">

  <div class="form-group">
    <label for="id_common_name">Nome</label>
    <input type="text" id="id_common_name" name="common_name" required
           value="{{ obj.common_name|default:'' }}">
  </div>

  <div class="form-group">
    <label for="id_latin_name">Nome latino</label>
    <input type="text" id="id_latin_name" name="latin_name"
           value="{{ obj.latin_name|default:'' }}">
  </div>

  <div class="form-group">
    <label for="id_density">Densità (q/m³)</label>
    <input type="text" inputmode="decimal" id="id_density" name="density" required
           value="{% if obj %}{{ obj.density|floatformat:2 }}{% else %}5,00{% endif %}">
  </div>

  <div class="form-group">
    <label for="id_pressler_default">Pressler</label>
    <input type="text" inputmode="decimal" id="id_pressler_default"
           name="pressler_default" required
           value="{% if obj %}{{ obj.pressler_default|floatformat:2 }}{% else %}{{ pressler_default|floatformat:2 }}{% endif %}">
  </div>

  <div class="form-group">
    <label>
      <input type="hidden" name="minor" value="false">
      <input type="checkbox" name="minor" value="true"
             {% if obj.minor %}checked{% endif %}
             {% if obj.common_name == S.SPECIES_OTHER %}disabled{% endif %}>
      Minore
    </label>
  </div>

  <div class="form-group">
    <label>
      <input type="hidden" name="active" value="false">
      <input type="checkbox" name="active" value="true"
             {% if obj.active or not obj %}checked{% endif %}>
      Attivo
    </label>
  </div>

  <div class="form-actions">
    <button type="button" class="btn" data-action="cancel">{{ S.CANCEL }}</button>
    <button type="submit" class="btn btn-save">{{ S.SAVE }}</button>
  </div>
</form>
