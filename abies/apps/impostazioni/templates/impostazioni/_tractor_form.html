<form id="settings-form">
  <input type="hidden" name="row_id" value="{{ obj.id|default_if_none:'' }}">
  <input type="hidden" name="version" value="{{ obj.version|default:'1' }}">

  <div class="form-group">
    <label for="id_manufacturer">Costruttore</label>
    <input type="text" id="id_manufacturer" name="manufacturer" required
           value="{{ obj.manufacturer|default:'' }}">
  </div>

  <div class="form-group">
    <label for="id_model">Modello</label>
    <input type="text" id="id_model" name="model"
           value="{{ obj.model|default:'' }}">
  </div>

  <div class="form-group">
    <label for="id_year">Anno</label>
    <input type="number" id="id_year" name="year" min="1900" max="2100"
           value="{% if obj.year %}{{ obj.year }}{% endif %}">
  </div>

  <div class="form-group">
    <label>
      <input type="hidden" name="active" value="false">
      <input type="checkbox" name="active" value="true"
             {% if obj.active or not obj %}checked{% endif %}>
      Attivo
    </label>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Salva</button>
  </div>
</form>
