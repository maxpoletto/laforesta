{% load i18n %}
<div class="form-card">
  <form id="plan-form">
    <input type="hidden" name="row_id" value="{{ plan.id|default_if_none:'' }}">
    <input type="hidden" name="version" value="{{ plan.version|default:'1' }}">

    <h2>{% if plan %}Modifica piano{% else %}Nuovo piano{% endif %}</h2>

    <div class="form-row">
      <div class="form-group">
        <label for="id_plan_name">Nome</label>
        <input type="text" id="id_plan_name" name="name" required
               maxlength="100"
               value="{{ plan.name|default:'' }}">
      </div>
    </div>

    <div class="form-row narrow">
      <div class="form-group">
        <label for="id_year_start">Anno inizio</label>
        <input type="number" id="id_year_start" name="year_start"
               required min="1900" max="2200"
               value="{{ plan.year_start|default:'' }}">
      </div>
      <div class="form-group">
        <label for="id_year_end">Anno fine</label>
        <input type="number" id="id_year_end" name="year_end"
               required min="1900" max="2200"
               value="{{ plan.year_end|default:'' }}">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="id_plan_description">Descrizione</label>
        <textarea id="id_plan_description" name="description"
                  rows="4">{{ plan.description|default:'' }}</textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn" data-action="cancel">{{ S.CANCEL }}</button>
      <button type="submit" class="btn btn-save">{{ S.SAVE }}</button>
    </div>
  </form>
</div>
