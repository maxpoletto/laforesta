# Apache snippet for Abies — paste inside the existing laforesta.it
# <VirtualHost *:443> block (the one that currently serves bosco/).
#
# Modules required (enable once):
#   a2enmod proxy proxy_http headers alias
#
# Topology:
#   - Static files served directly by Apache from /var/lib/abies/static/
#     (populated by the container's collectstatic on each start).
#   - Everything else under /abies/ proxied to gunicorn on 127.0.0.1:8000.

# --- Static files -----------------------------------------------------------

Alias /abies/static/ /var/lib/abies/static/

<Directory /var/lib/abies/static/>
    Require all granted
    Options -Indexes
</Directory>

# Override ProxyPass for /abies/static/: Apache serves these locally.
ProxyPass        /abies/static/ !

# --- Application ------------------------------------------------------------

# Preserve the incoming Host header so Django sees laforesta.it, not 127.0.0.1.
ProxyPreserveHost On

# Tell Django the request originated over HTTPS (Apache terminates TLS and
# forwards plain HTTP on loopback).  Must match SECURE_PROXY_SSL_HEADER in
# settings.py.
RequestHeader set X-Forwarded-Proto "https"

ProxyPass        /abies/  http://127.0.0.1:8000/abies/
ProxyPassReverse /abies/  http://127.0.0.1:8000/abies/
