<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1f5b1a">
  <title>Ipso — martellata</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/f.gif">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-bar">
    <span class="app-title">Ipso</span>
    <span class="app-sub" id="sub-status"></span>
  </header>

  <main id="main">

    <div id="banner-storage" class="banner hidden"></div>

    <!-- ============= PRE-SESSION ============= -->
    <section id="screen-pre" class="screen" hidden>
      <h1 id="pre-title"></h1>
      <form id="pre-form">
        <label class="field">
          <span class="lbl" id="lbl-operatore"></span>
          <input id="in-operatore" type="text" autocomplete="off" required>
        </label>
        <label class="field">
          <span class="lbl" id="lbl-data"></span>
          <input id="in-data" type="date" required>
        </label>
        <label class="field">
          <span class="lbl" id="lbl-compresa"></span>
          <select id="in-compresa" required></select>
        </label>
        <label class="check" for="in-catastrofata">
          <input type="checkbox" id="in-catastrofata">
          <span class="check-lbl" id="lbl-catastrofata"></span>
        </label>
        <label class="field" id="field-particella">
          <span class="lbl" id="lbl-particella"></span>
          <select id="in-particella" required disabled></select>
        </label>
        <button id="btn-start" class="btn-primary btn-big" type="submit"></button>
      </form>
    </section>

    <!-- ============= RECORDING ============= -->
    <section id="screen-rec" class="screen" hidden>
      <div class="rec-header">
        <div class="rec-where" id="rec-where"></div>
        <div class="gps" id="gps">
          <span class="gps-dot" id="gps-dot"></span>
          <span class="gps-text" id="gps-text"></span>
        </div>
      </div>

      <div class="pill" id="pill">
        <span class="pill-text" id="pill-text"></span>
        <button id="pill-action" class="pill-btn" type="button" hidden></button>
      </div>

      <label class="field">
        <span class="lbl" id="lbl-specie"></span>
        <select id="in-specie" class="big-select"></select>
      </label>

      <div class="dh-row">
        <label class="field dh">
          <span class="lbl" id="lbl-d"></span>
          <input id="in-d" type="text" inputmode="none" readonly autocomplete="off">
        </label>
        <label class="field dh">
          <span class="lbl" id="lbl-h"></span>
          <input id="in-h" type="text" inputmode="none" readonly autocomplete="off">
        </label>
      </div>
      <div class="hint" id="hint-autoh" hidden></div>

      <div id="numpad" class="numpad"></div>

      <button id="btn-save" class="btn-primary btn-big" type="button" disabled></button>
      <button id="btn-end" class="btn-secondary" type="button"></button>
    </section>

    <!-- ============= DONE ============= -->
    <section id="screen-done" class="screen" hidden>
      <h1 id="done-title"></h1>
      <p id="done-body"></p>
      <button id="btn-new-session" class="btn-primary btn-big" type="button"></button>
    </section>

    <!-- ============= MODALS ============= -->

    <div id="modal-resume" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2 id="resume-title"></h2>
        <p id="resume-body"></p>
        <ul id="resume-list"></ul>
      </div>
    </div>

    <div id="modal-confirm-end" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2 id="end-title"></h2>
        <p id="end-body"></p>
        <div class="modal-actions">
          <button id="end-cancel" class="btn-secondary" type="button"></button>
          <button id="end-confirm" class="btn-primary" type="button"></button>
        </div>
      </div>
    </div>

    <div id="modal-edit-last" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2 id="edit-title"></h2>
        <p id="edit-body"></p>
        <div class="modal-actions">
          <button id="edit-cancel" class="btn-secondary" type="button"></button>
          <button id="edit-delete" class="btn-danger" type="button"></button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

  </main>

  <footer class="footer">
    <span id="footer-version"></span>
  </footer>

  <script src="strings.js"></script>
  <script src="csv.js"></script>
  <script src="ipso.js"></script>
  <script src="session.js"></script>
  <script src="download.js"></script>
  <script src="gps.js"></script>
  <script src="numpad.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
